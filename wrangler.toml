name = "fileshare"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# KV namespace for rate limiting
# 1. npx wrangler kv namespace create "FILESHARE_RATE_LIMIT"
# 2. Copy the returned id into the field below
[[kv_namespaces]]
binding = "FILESHARE_RATE_LIMIT"
id = "40382be173564935b1c845bb6d97e1f4"

[vars]
NITRO_PRESET = "cloudflare-module"
NODE_ENV = "production"

# Secrets (set via: npx wrangler secret put <name>)
# - DATABASE_URL
# - CLERK_SECRET_KEY
# - VITE_CLERK_PUBLISHABLE_KEY
